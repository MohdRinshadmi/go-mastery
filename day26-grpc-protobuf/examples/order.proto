// order.proto — the source of truth for the OrderService contract.
//
// In production you would run:
//   protoc --go_out=. --go_opt=paths=source_relative \
//          --go-grpc_out=. --go-grpc_opt=paths=source_relative \
//          order.proto
//
// That generates pb/order.pb.go and pb/order_grpc.pb.go
// For this lesson those files are hand-authored so `go build` works
// without protoc installed. The hand-authored code is semantically
// identical to what protoc would produce.

syntax = "proto3";

package order;
option go_package = "day26/examples/pb;pb";

// ── Messages ──────────────────────────────────────────────────────────────

message OrderItem {
    string product_id = 1;
    int32  quantity   = 2;
    double price_usd  = 3;
}

message CreateOrderRequest {
    string            customer_id = 1;
    repeated OrderItem items      = 2;
}

message GetOrderRequest {
    string order_id = 1;
}

message ListOrdersRequest {
    string customer_id = 1;
}

message CancelOrderRequest {
    string order_id = 1;
    string reason   = 2;
}

message OrderResponse {
    string order_id    = 1;
    string customer_id = 2;
    string status      = 3;
    double total_usd   = 4;
}

// ── Service ───────────────────────────────────────────────────────────────

service OrderService {
    // Unary — one request, one response
    rpc CreateOrder(CreateOrderRequest) returns (OrderResponse);
    rpc GetOrder(GetOrderRequest)       returns (OrderResponse);
    rpc CancelOrder(CancelOrderRequest) returns (OrderResponse);

    // Server streaming — one request, stream of N responses
    rpc ListOrders(ListOrdersRequest) returns (stream OrderResponse);
}
